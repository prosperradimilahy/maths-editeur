/*<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Éditeur Maths MathML5 — Complet</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+3:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0e17;--surface:#1a1826;--card:#22203a;--border:rgba(255,255,255,0.08);
  --accent:#7c6af7;--accent2:#e8c547;--text:#e8e6f0;--muted:#8b88a8;
  --success:#4ecb8d;--radius:12px;
  --font-body:'Source Sans 3',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --font-display:'Playfair Display',serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.logo{font-family:var(--font-display);font-size:1.4rem;display:flex;align-items:center;gap:.5rem;}
.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);display:inline-block;}
.badge{font-size:11px;background:rgba(124,106,247,0.2);color:var(--accent);border:1px solid rgba(124,106,247,0.35);padding:3px 10px;border-radius:20px;font-family:var(--font-mono);}
.container{max-width:1200px;margin:0 auto;padding:1.5rem 1rem;}

/* TABS */
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.cat-tab{padding:6px 14px;font-size:12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;font-family:var(--font-body);}
.cat-tab.on{background:rgba(124,106,247,0.2);color:var(--accent);border-color:rgba(124,106,247,0.4);}

/* SYMBOLS */
.sym-grid{display:flex;flex-wrap:wrap;gap:5px;min-height:44px;}
.sym-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:12px;padding:5px 9px;border-radius:6px;cursor:pointer;font-family:var(--font-mono);transition:all .15s;white-space:nowrap;}
.sym-btn:hover{background:rgba(124,106,247,0.15);border-color:var(--accent);color:var(--accent);}
.sym-label{font-size:10px;color:var(--muted);margin:6px 0 3px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em;}

/* PANELS */
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;}
.panel-title{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;}
@media(max-width:680px){.grid2{grid-template-columns:1fr;}}
.full{grid-column:1/-1;}

/* EDITOR */
#latex-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-mono);font-size:14px;padding:.7rem 1rem;resize:vertical;min-height:80px;outline:none;transition:border-color .15s;line-height:1.6;}
#latex-input:focus{border-color:var(--accent);}
#latex-input::placeholder{color:var(--muted);}

/* PREVIEW */
#preview-zone{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.1rem;min-height:80px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;overflow-x:auto;transition:border-color .2s;}
#preview-zone.ok{border-color:rgba(78,203,141,0.35);}
#preview-zone math{color:var(--text);}

/* CODE */
#mathml-code{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.7rem 1rem;font-family:var(--font-mono);font-size:11px;color:#a0cff7;white-space:pre-wrap;word-break:break-all;max-height:140px;overflow-y:auto;line-height:1.5;}

/* BUTTONS */
.btn-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:.7rem;}
.btn{padding:7px 15px;border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;border:1px solid transparent;font-family:var(--font-body);transition:all .15s;}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:#6a58e0;}
.btn-outline{background:transparent;color:var(--text);border-color:var(--border);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-gold{background:rgba(232,197,71,0.15);color:var(--accent2);border-color:rgba(232,197,71,0.3);}
.btn-gold:hover{background:rgba(232,197,71,0.25);}
.btn-green{background:rgba(78,203,141,0.15);color:#4ecb8d;border-color:rgba(78,203,141,0.3);}

/* EXAMPLES */
.ex-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:.5rem;}
.ex-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 9px;border-radius:5px;cursor:pointer;font-family:var(--font-mono);transition:all .15s;}
.ex-btn:hover{border-color:var(--accent2);color:var(--accent2);}

/* IMAGE */
#img-preview{display:none;width:100%;border-radius:8px;border:1px solid var(--border);margin-top:.6rem;}

/* GUIDE TABLE */
.guide{width:100%;border-collapse:collapse;font-size:12px;}
.guide th{text-align:left;color:var(--muted);font-weight:500;padding:5px 8px;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.05em;}
.guide td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle;}
.guide tr:last-child td{border-bottom:none;}
.guide .code{font-family:var(--font-mono);color:var(--accent);font-size:11px;}
.guide math{font-size:.95rem;}
.guide-section{font-size:11px;font-weight:600;color:var(--accent2);padding:8px 8px 3px;text-transform:uppercase;letter-spacing:.08em;}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:var(--success);color:#0f0e17;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;z-index:999;}
#toast.show{opacity:1;transform:translateY(0);}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-dot"></span>Éditeur Maths MathML5</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <span class="badge">MathML5 · HTML5</span>
    <span class="badge" style="background:rgba(78,203,141,0.15);color:#4ecb8d;border-color:rgba(78,203,141,0.3);">v2.0 — Complet</span>
    
  </div>
  <div>  <a href="jeu Mathématiques.html>jeu <a>
</header>

<div class="container">
<div class="grid2">

  <!-- COL GAUCHE : Saisie + Symboles -->
  <div style="display:flex;flex-direction:column;gap:1rem;">

    <div class="panel">
      <div class="panel-title">Catégories de symboles</div>
      <div class="cat-tabs" id="cat-tabs"></div>
      <div id="sym-area"></div>
    </div>

    <div class="panel">
      <div class="panel-title">Ta formule</div>
      <textarea id="latex-input" placeholder="Ex: int(0,1,2*x+3 dx)  ou  mat2(a,b,c,d)  ou  sin^2(x)+cos^2(x)=1"></textarea>
      <div class="panel-title" style="margin-top:.8rem;">Exemples</div>
      <div class="ex-row" id="examples"></div>
    </div>

  </div>

  <!-- COL DROITE : Rendu + Export -->
  <div style="display:flex;flex-direction:column;gap:1rem;">

    <div class="panel">
      <div class="panel-title">Rendu MathML5</div>
      <div id="preview-zone"><span style="color:var(--muted);font-size:14px;">Tape une formule...</span></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="genImage()">Image PNG</button>
        <button class="btn btn-gold" onclick="copyML()">Copier MathML</button>
        <button class="btn btn-outline" onclick="copyTxt()">Copier texte</button>
        <button class="btn btn-outline" onclick="clearAll()">Effacer</button>
      </div>
      <canvas id="cvs" style="display:none;"></canvas>
      <img id="img-preview" alt="Formule">
      <div id="dl-wrap" style="display:none;margin-top:8px;">
        <a id="dl-link" download="formule.png">
          <button class="btn btn-green" style="width:100%;">Télécharger — poster sur Facebook</button>
        </a>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Code MathML5 généré</div>
      <div id="mathml-code"><!-- formule ici --></div>
    </div>

  </div>

  <!-- GUIDE PLEINE LARGEUR -->
  <div class="panel full">
    <div class="panel-title">Guide complet de syntaxe</div>
    <div style="overflow-x:auto;">
    <table class="guide" id="guide-table"></table>
    </div>
  </div>

</div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// DONNÉES : Catégories, symboles, exemples, guide
// ═══════════════════════════════════════════════════

  {l:'sin²+cos²=1', v:'sin^2(x)+cos^2(x)=1'},

  {c:'vec(u)', r:'<mover><mi>u</mi><mo>→</mo></mover>', note:'Vecteur'},
  {c:'det(A)', r:'<mo>det</mo><mo>(</mo><mi>A</mi><mo>)</mo>', note:'Déterminant'},
  {c:'trans(A)', r:'<msup><mi>A</mi><mi>T</mi></msup>', note:'Transposée'},
  {c:'inv(A)', r:'<msup><mi>A</mi><mrow><mo>-</mo><mn>1</mn></mrow></msup>', note:'Inverse'},
  {c:'norm(u)', r:'<mrow><mo>‖</mo><mi>u</mi><mo>‖</mo></mrow>', note:'Norme'},
  {sec:'Nombres complexes'},
  {c:'conj(z)', r:'<mover><mi>z</mi><mo>¯</mo></mover>', note:'Conjugué'},
  {c:'mod(z)', r:'<mrow><mo>|</mo><mi>z</mi><mo>|</mo></mrow>', note:'Module'},
  {c:'Re(z)', r:'<mo>Re</mo><mo>(</mo><mi>z</mi><mo>)</mo>', note:'Partie réelle'},
  {c:'Im(z)', r:'<mo>Im</mo><mo>(</mo><mi>z</mi><mo>)</mo>', note:'Partie imaginaire'},
  {sec:'Probabilités & Stats'},
  {c:'P(A)', r:'<mi>P</mi><mo>(</mo><mi>A</mi><mo>)</mo>', note:'Probabilité'},
  {c:'P(A|B)', r:'<mi>P</mi><mo>(</mo><mi>A</mi><mo>|</mo><mi>B</mi><mo>)</mo>', note:'Probabilité conditionnelle'},
  {c:'comb(n,k)', r:'<mfenced open="(" close=")"><mfrac linethickness="0"><mi>n</mi><mi>k</mi></mfrac></mfenced>', note:'Combinaison'},
  {c:'xbar', r:'<mover><mi>x</mi><mo>¯</mo></mover>', note:'Moyenne'},
  {c:'sys2(eq1,eq2)', r:'<mfenced open="{" close=""><mtable columnalign="left">...</mtable></mfenced>', note:'Système 2 équations'},
];

let curCat = 'base';

function buildCatTabs(){
  const el = document.getElementById('cat-tabs');
  el.innerHTML = CATS.map(c=>
    `<button class="cat-tab ${c.id===curCat?'on':''}" onclick="setCat('${c.id}')">${c.label}</button>`
  ).join('');
}

function buildSymArea(){
  const cat = CATS.find(c=>c.id===curCat);
  const el = document.getElementById('sym-area');
  el.innerHTML = cat.groups.map(g=>`
    <div class="sym-label">${g.label}</div>
    <div class="sym-grid">
      ${g.syms.map(s=>`<button class="sym-btn" onclick="ins('${s.c.replace(/'/g,"\\'")}',this)">${s.l}</button>`).join('')}
    </div>
  `).join('');
}

function setCat(id){ curCat=id; buildCatTabs(); buildSymArea(); }

function buildExamples(){
  document.getElementById('examples').innerHTML = EXAMPLES.map(e=>
    `<button class="ex-btn" onclick="loadEx('${e.v.replace(/'/g,"\\'")}','${e.l}')">${e.l}</button>`
  ).join('');
}

function buildGuide(){
  const t = document.getElementById('guide-table');
  t.innerHTML = `<thead><tr><th>Syntaxe</th><th>Rendu</th><th>Description</th></tr></thead><tbody>`+
  GUIDE_DATA.map(r=>{
    if(r.sec) return `<tr><td colspan="3" class="guide-section">${r.sec}</td></tr>`;
    return `<tr>
      <td class="code">${r.c}</td>
      <td><math xmlns="http://www.w3.org/1998/Math/MathML">${r.r}</math></td>
      <td style="color:var(--muted);font-size:11px;">${r.note}</td>
    </tr>`;
  }).join('')+'</tbody>';
}

function loadEx(v,l){
  document.getElementById('latex-input').value = v;
  parseAndRender();
}

function ins(code){
  const inp = document.getElementById('latex-input');
  const s = inp.selectionStart, e = inp.selectionEnd;
  inp.value = inp.value.slice(0,s)+code+inp.value.slice(e);
  inp.selectionStart = inp.selectionEnd = s+code.length;
  inp.focus();
  parseAndRender();
}

// ═══════════════════════════════════════════════════
// PARSER TEXTE → MathML
// ═══════════════════════════════════════════════════

function toMathML(expr){
  expr = expr.trim();

  // Systèmes d'équations
  expr = expr.replace(/sys3\(([^,]+),([^,]+),(.+?)\)/g, (_,e1,e2,e3)=>
    `<mfenced open="{" close=""><mtable columnalign="left"><mtr><mtd>${tok(e1)}</mtd></mtr><mtr><mtd>${tok(e2)}</mtd></mtr><mtr><mtd>${tok(e3)}</mtd></mtr></mtable></mfenced>`);
  expr = expr.replace(/sys2\(([^,]+),(.+?)\)/g, (_,e1,e2)=>
    `<mfenced open="{" close=""><mtable columnalign="left"><mtr><mtd>${tok(e1)}</mtd></mtr><mtr><mtd>${tok(e2)}</mtd></mtr></mtable></mfenced>`);

  // Matrice 3×3
  expr = expr.replace(/mat3\(([^,]+),([^,]+),([^,]+),([^,]+),([^,]+),([^,]+),([^,]+),([^,]+),([^)]+)\)/g,
    (_,a,b,c,d,e,f,g,h,i)=>
    `<mfenced open="(" close=")"><mtable>`+
    `<mtr><mtd>${tok(a)}</mtd><mtd>${tok(b)}</mtd><mtd>${tok(c)}</mtd></mtr>`+
    `<mtr><mtd>${tok(d)}</mtd><mtd>${tok(e)}</mtd><mtd>${tok(f)}</mtd></mtr>`+
    `<mtr><mtd>${tok(g)}</mtd><mtd>${tok(h)}</mtd><mtd>${tok(i)}</mtd></mtr>`+
    `</mtable></mfenced>`);

  // Matrice 2×2
  expr = expr.replace(/mat2\(([^,]+),([^,]+),([^,]+),([^)]+)\)/g, (_,a,b,c,d)=>
    `<mfenced open="(" close=")"><mtable>`+
    `<mtr><mtd>${tok(a)}</mtd><mtd>${tok(b)}</mtd></mtr>`+
    `<mtr><mtd>${tok(c)}</mtd><mtd>${tok(d)}</mtd></mtr>`+
    `</mtable></mfenced>`);

  // Vecteur colonne
  expr = expr.replace(/colvec\(([^,]+),([^,]+),([^)]+)\)/g, (_,a,b,c)=>
    `<mfenced open="(" close=")"><mtable>`+
    `<mtr><mtd>${tok(a)}</mtd></mtr><mtr><mtd>${tok(b)}</mtd></mtr><mtr><mtd>${tok(c)}</mtd></mtr>`+
    `</mtable></mfenced>`);

  // Déterminant avec barres
  expr = expr.replace(/detbar\(([^)]+)\)/g, (_,a)=>
    `<mfenced open="|" close="|"><mi>${a.trim()}</mi></mfenced>`);

  // Intégrale double
  expr = expr.replace(/iint\((.+?)\)/g, (_,e)=>
    `<mo>∬</mo><mrow>${tok(e)}</mrow>`);

  // Intégrale contour
  expr = expr.replace(/oint\((.+?)\)/g, (_,e)=>
    `<mo>∮</mo><mrow>${tok(e)}</mrow>`);

  // Intégrale définie
  expr = expr.replace(/intab\(([^,]+),([^,]+),(.+?)\)/g, (_,a,b,e)=>
    `<msubsup><mo>∫</mo><mrow>${tok(a)}</mrow><mrow>${tok(b)}</mrow></msubsup><mrow>${tok(e)}</mrow>`);

  // Intégrale simple
  expr = expr.replace(/int\((.+?)\)/g, (_,e)=>
    `<mo>∫</mo><mrow>${tok(e)}</mrow>`);

  // Dérivée 2e ordre
  expr = expr.replace(/deriv2\(([^,]+),([^)]+)\)/g, (_,f,x)=>
    `<mfrac><mrow><msup><mi>d</mi><mn>2</mn></msup><mi>${f.trim()}</mi></mrow>`+
    `<mrow><mi>d</mi><msup><mi>${x.trim()}</mi><mn>2</mn></msup></mrow></mfrac>`);

  // Dérivée 1re ordre
  expr = expr.replace(/deriv\(([^,]+),([^)]+)\)/g, (_,f,x)=>
    `<mfrac><mrow><mi>d</mi><mi>${f.trim()}</mi></mrow><mrow><mi>d</mi><mi>${x.trim()}</mi></mrow></mfrac>`);

  // Dérivée notation f'
  expr = expr.replace(/([a-zA-Z])'\(([^)]+)\)/g, (_,f,x)=>
    `<msup><mi>${f}</mi><mo>′</mo></msup><mo>(</mo><mi>${x}</mi><mo>)</mo>`);

  // Dérivée partielle
  expr = expr.replace(/partial\(([^,]+),([^)]+)\)/g, (_,f,x)=>
    `<mfrac><mrow><mo>∂</mo><mi>${f.trim()}</mi></mrow><mrow><mo>∂</mo><mi>${x.trim()}</mi></mrow></mfrac>`);

  // diff notation
  expr = expr.replace(/diff\(([^,]+),([^)]+)\)/g, (_,f,x)=>
    `<mfrac><mrow><mi>d</mi><mi>${f.trim()}</mi></mrow><mrow><mi>d</mi><mi>${x.trim()}</mi></mrow></mfrac>`);

  // Nabla
  expr = expr.replace(/nabla\(([^)]+)\)/g, (_,f)=>
    `<mo>∇</mo><mi>${f.trim()}</mi>`);

  // Limites avec signe
  expr = expr.replace(/limp\(([^,]+),([^,]+),(.+?)\)/g, (_,v,val,e)=>
    `<munder><mo>lim</mo><mrow>${tok(v)}<mo>→</mo>${tok(val)}<msup><mrow></mrow><mo>+</mo></msup></mrow></munder><mrow>${tok(e)}</mrow>`);
  expr = expr.replace(/limm\(([^,]+),([^,]+),(.+?)\)/g, (_,v,val,e)=>
    `<munder><mo>lim</mo><mrow>${tok(v)}<mo>→</mo>${tok(val)}<msup><mrow></mrow><mo>−</mo></msup></mrow></munder><mrow>${tok(e)}</mrow>`);
  expr = expr.replace(/lim\(([^,]+),([^,]+),(.+?)\)/g, (_,v,val,e)=>
    `<munder><mo>lim</mo><mrow>${tok(v)}<mo>→</mo>${tok(val)}</mrow></munder><mrow>${tok(e)}</mrow>`);

  // Somme & Produit
  expr = expr.replace(/sum\(([^,]+),([^,]+),(.+?)\)/g, (_,f,t,e)=>
    `<munderover><mo>∑</mo><mrow>${tok(f)}</mrow><mrow>${tok(t)}</mrow></munderover><mrow>${tok(e)}</mrow>`);
  expr = expr.replace(/prod\(([^,]+),([^,]+),(.+?)\)/g, (_,f,t,e)=>
    `<munderover><mo>∏</mo><mrow>${tok(f)}</mrow><mrow>${tok(t)}</mrow></munderover><mrow>${tok(e)}</mrow>`);

  // Racines
  expr = expr.replace(/nroot\(([^,]+),([^)]+)\)/g, (_,n,x)=>
    `<mroot><mrow>${tok(x)}</mrow><mrow>${tok(n)}</mrow></mroot>`);
  expr = expr.replace(/cbrt\(([^)]+)\)/g, (_,x)=>
    `<mroot><mrow>${tok(x)}</mrow><mn>3</mn></mroot>`);
  expr = expr.replace(/sqrt\(([^)]+)\)/g, (_,x)=>
    `<msqrt><mrow>${tok(x)}</mrow></msqrt>`);

  // Fraction
  expr = expr.replace(/frac\(([^,]+),([^)]+)\)/g, (_,a,b)=>
    `<mfrac><mrow>${tok(a)}</mrow><mrow>${tok(b)}</mrow></mfrac>`);

  // Vecteur
  expr = expr.replace(/vec\(([^)]+)\)/g, (_,u)=>
    `<mover><mi>${u.trim()}</mi><mo>→</mo></mover>`);

  // Norme
  expr = expr.replace(/norm\(([^)]+)\)/g, (_,u)=>
    `<mrow><mo>‖</mo><mi>${u.trim()}</mi><mo>‖</mo></mrow>`);

  // Produit scalaire / vectoriel
  expr = expr.replace(/dot\(([^,]+),([^)]+)\)/g, (_,u,v)=>
    `<mover><mi>${u.trim()}</mi><mo>→</mo></mover><mo>·</mo><mover><mi>${v.trim()}</mi><mo>→</mo></mover>`);
  expr = expr.replace(/cross\(([^,]+),([^)]+)\)/g, (_,u,v)=>
    `<mover><mi>${u.trim()}</mi><mo>→</mo></mover><mo>×</mo><mover><mi>${v.trim()}</mi><mo>→</mo></mover>`);

  // Conjugué, module, partie R/I
  expr = expr.replace(/conj\(([^)]+)\)/g, (_,z)=>
    `<mover><mi>${z.trim()}</mi><mo>¯</mo></mover>`);
  expr = expr.replace(/mod\(([^)]+)\)/g, (_,z)=>
    `<mrow><mo>|</mo><mi>${z.trim()}</mi><mo>|</mo></mrow>`);
  expr = expr.replace(/Re\(([^)]+)\)/g, (_,z)=>
    `<mo>Re</mo><mo>(</mo><mi>${z.trim()}</mi><mo>)</mo>`);
  expr = expr.replace(/Im\(([^)]+)\)/g, (_,z)=>
    `<mo>Im</mo><mo>(</mo><mi>${z.trim()}</mi><mo>)</mo>`);
  expr = expr.replace(/arg\(([^)]+)\)/g, (_,z)=>
    `<mo>arg</mo><mo>(</mo><mi>${z.trim()}</mi><mo>)</mo>`);

  // Inverse, transposée, déterminant
  expr = expr.replace(/inv\(([^)]+)\)/g, (_,a)=>
    `<msup><mi>${a.trim()}</mi><mrow><mo>-</mo><mn>1</mn></mrow></msup>`);
  expr = expr.replace(/trans\(([^)]+)\)/g, (_,a)=>
    `<msup><mi>${a.trim()}</mi><mi>T</mi></msup>`);
  expr = expr.replace(/det\(([^)]+)\)/g, (_,a)=>
    `<mo>det</mo><mo>(</mo><mi>${a.trim()}</mi><mo>)</mo>`);

  // Combinaisons
  expr = expr.replace(/comb\(([^,]+),([^)]+)\)/g, (_,n,k)=>
    `<mfenced open="(" close=")"><mfrac linethickness="0"><mrow>${tok(n)}</mrow><mrow>${tok(k)}</mrow></mfrac></mfenced>`);

  // Trigo inverses
  const invTrig=['arcsin','arccos','arctan','arcsinh','arccosh','arctanh'];
  invTrig.forEach(fn=>{
    const re = new RegExp(fn+'\\(([^)]+)\\)','g');
    expr = expr.replace(re, (_,x)=>
      `<msup><mo>${fn.replace('arc','').replace('h','')}</mo><mrow><mo>-</mo><mn>1</mn></mrow></msup><mo>(</mo>${tok(x)}<mo>)</mo>`);
  });

  // Log avec base
  expr = expr.replace(/log_([^(]+)\(([^)]+)\)/g, (_,base,x)=>
    `<msub><mo>log</mo><mrow>${tok(base)}</mrow></msub><mo>(</mo>${tok(x)}<mo>)</mo>`);

  // Trigo & log/exp (fonctions simples)
  const fns=['sin','cos','tan','cot','sec','csc','sinh','cosh','tanh','ln','log','exp','det','lim','max','min','mod','Re','Im','arg','P','grad'];
  fns.forEach(fn=>{
    const re = new RegExp('(?<![a-zA-Z])'+fn+'\\(([^)]+)\\)','g');
    expr = expr.replace(re, (_,x)=>{
      if(fn==='exp') return `<msup><mi>e</mi><mrow>${tok(x)}</mrow></msup>`;
      return `<mo>${fn}</mo><mo>(</mo><mrow>${tok(x)}</mrow><mo>)</mo>`;
    });
  });

  // P(A|B) probabilité conditionnelle
  expr = expr.replace(/P\(([^|)]+)\|([^)]+)\)/g, (_,a,b)=>
    `<mi>P</mi><mo>(</mo>${tok(a)}<mo>|</mo>${tok(b)}<mo>)</mo>`);

  // xbar (moyenne)
  expr = expr.replace(/\bxbar\b/g, '<mover><mi>x</mi><mo>¯</mo></mover>');

  // n! factorielle
  expr = expr.replace(/(\w+)!/g, (_,n)=>`<mi>${n}</mi><mo>!</mo>`);

  return tok(expr);
}

function tok(expr){
  if(!expr) return '';
  expr = String(expr).trim();
  if(expr.includes('<m')) return expr;

  let out='', i=0;
  while(i<expr.length){
    // { } groupes
    if(expr[i]==='{'){
      let g='',d=1; i++;
      while(i<expr.length&&d>0){
        if(expr[i]==='{')d++;else if(expr[i]==='}')d--;
        if(d>0)g+=expr[i];i++;
      }
      out+=`<mrow>${tok(g)}</mrow>`;continue;
    }
    // Puissance ^
    if(expr[i]==='^'){
      i++;
      let exp='';
      if(expr[i]==='{'){let d=1;i++;while(i<expr.length&&d>0){if(expr[i]==='{')d++;else if(expr[i]==='}')d--;if(d>0)exp+=expr[i];i++;}}
      else {while(i<expr.length&&/[\w\d]/.test(expr[i]))exp+=expr[i++];}
      const last=extractLast(out);
      out=out.slice(0,out.length-last.length);
      out+=`<msup><mrow>${last}</mrow><mrow>${tok(exp)}</mrow></msup>`;continue;
    }
    // Indice _
    if(expr[i]==='_'){
      i++;
      let sub='';
      if(expr[i]==='{'){let d=1;i++;while(i<expr.length&&d>0){if(expr[i]==='{')d++;else if(expr[i]==='}')d--;if(d>0)sub+=expr[i];i++;}}
      else{while(i<expr.length&&/[\w\d]/.test(expr[i]))sub+=expr[i++];}
      const last=extractLast(out);
      out=out.slice(0,out.length-last.length);
      out+=`<msub><mrow>${last}</mrow><mrow>${tok(sub)}</mrow></msub>`;continue;
    }
    // Nombres
    if(/\d/.test(expr[i])){
      let n='';while(i<expr.length&&/[\d.]/.test(expr[i]))n+=expr[i++];
      out+=`<mn>${n}</mn>`;continue;
    }
    // Mots (fonctions, variables)
    if(/[a-zA-Z\u0391-\u03C9]/.test(expr[i])){
      let w='';while(i<expr.length&&/[a-zA-Z\u0391-\u03C9]/.test(expr[i]))w+=expr[i++];
      const FNS=['sin','cos','tan','cot','sec','csc','sinh','cosh','tanh','ln','log',
                 'exp','lim','max','min','det','div','grad','Re','Im','arg','P',
                 'dx','dy','dz','dt','arcsin','arccos','arctan'];
      if(FNS.includes(w))out+=`<mo>${w}</mo>`;
      else if(w.length===1)out+=`<mi>${w}</mi>`;
      else out+=`<mi>${w}</mi>`;
      continue;
    }
    // Opérateurs et symboles
    const OPS={
      '+':'<mo>+</mo>','-':'<mo>−</mo>','=':'<mo>=</mo>',
      '*':'<mo>·</mo>','/':'<mo>/</mo>',
      '≤':'<mo>≤</mo>','≥':'<mo>≥</mo>','≠':'<mo>≠</mo>',
      '≈':'<mo>≈</mo>','∈':'<mo>∈</mo>','∉':'<mo>∉</mo>',
      '⊂':'<mo>⊂</mo>','∪':'<mo>∪</mo>','∩':'<mo>∩</mo>',
      '→':'<mo>→</mo>','∞':'<mo>∞</mo>','±':'<mo>±</mo>',
      '×':'<mo>×</mo>','∂':'<mo>∂</mo>','∇':'<mo>∇</mo>',
      'π':'<mi>π</mi>','α':'<mi>α</mi>','β':'<mi>β</mi>',
      'γ':'<mi>γ</mi>','δ':'<mi>δ</mi>','ε':'<mi>ε</mi>',
      'θ':'<mi>θ</mi>','λ':'<mi>λ</mi>','μ':'<mi>μ</mi>',
      'σ':'<mi>σ</mi>','φ':'<mi>φ</mi>','ω':'<mi>ω</mi>',
      'Δ':'<mi>Δ</mi>','Σ':'<mo>Σ</mo>','Π':'<mo>Π</mo>',
      'Γ':'<mi>Γ</mi>','Ω':'<mi>Ω</mi>',
      '(':'<mo>(</mo>',')':'<mo>)</mo>',
      '[':'<mo>[</mo>',']':'<mo>]</mo>',
      '|':'<mo>|</mo>',',':'<mo>,</mo>',' ':''
    };
    if(OPS[expr[i]]!==undefined){out+=OPS[expr[i]];i++;continue;}
    out+=`<mo>${expr[i]}</mo>`;i++;
  }
  return out;
}

function extractLast(ml){
  if(!ml)return '<mi>x</mi>';
  const m=ml.match(/<[^>]+>[^<]*<\/[^>]+>$/)||ml.match(/<[^/][^>]*\/>$/);
  if(m)return m[0];
  const tags=ml.match(/<[^>]+>/g);
  if(!tags||!tags.length)return ml;
  return ml;
}

// RENDU & ACTIONS
// ═══════════════════════════════════════════════════

let debTimer=null;
function parseAndRender(){
  clearTimeout(debTimer);
  debTimer=setTimeout(()=>{
    const raw=document.getElementById('latex-input').value.trim();
    const pz=document.getElementById('preview-zone');
    if(!raw){
      pz.innerHTML='<span style="color:var(--muted);font-size:14px;">Tape une formule...</span>';
      pz.classList.remove('ok');
      document.getElementById('mathml-code').textContent='';
      return;
    }
    const ml=toMathML(raw);
    const full=`<math xmlns="http://www.w3.org/1998/Math/MathML" display="block">${ml}</math>`;
    pz.innerHTML=full;
    pz.classList.add('ok');
    document.getElementById('mathml-code').textContent=formatML(full);
  },250);
}

function formatML(ml){
  return ml.replace(/></g,'>\n  ').replace(/^/,'').trim();
}

document.getElementById('latex-input').addEventListener('input',parseAndRender);

function genImage(){
  const raw=document.getElementById('latex-input').value.trim();
  if(!raw){toast('Écris une formule d\'abord !');return;}
  const pz=document.getElementById('preview-zone');
  const cv=document.getElementById('cvs');
  const W=640,H=200;
  cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#0f0e17';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(124,106,247,0.4)';ctx.lineWidth=1.5;
  ctx.roundRect(10,10,W-20,H-20,10);ctx.stroke();
  ctx.fillStyle='rgba(124,106,247,0.8)';ctx.font='500 12px sans-serif';
  ctx.textAlign='left';ctx.fillText('Formule mathématique',24,32);
  ctx.fillStyle='rgba(139,136,168,0.6)';ctx.font='11px monospace';
  ctx.fillText(raw.length>75?raw.slice(0,75)+'…':raw,24,H-20);
  ctx.fillStyle='rgba(139,136,168,0.35)';ctx.font='10px sans-serif';
  ctx.textAlign='right';ctx.fillText('Groupe Maths Madagascar',W-20,H-20);

  const svgNS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(svgNS,'svg');
  svg.setAttribute('xmlns',svgNS);svg.setAttribute('width',W);svg.setAttribute('height',H);
  const fo=document.createElementNS(svgNS,'foreignObject');
  fo.setAttribute('x','20');fo.setAttribute('y','44');
  fo.setAttribute('width',W-40+'');fo.setAttribute('height','110');
  const div=document.createElement('div');
  div.setAttribute('xmlns','http://www.w3.org/1999/xhtml');
  div.style.cssText='display:flex;align-items:center;justify-content:center;height:110px;color:#e8e6f0;font-size:26px;';
  div.innerHTML=pz.innerHTML;
  fo.appendChild(div);svg.appendChild(fo);
  const xml=new XMLSerializer().serializeToString(svg);
  const blob=new Blob([xml],{type:'image/svg+xml;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=()=>{
    ctx.drawImage(img,0,0);

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katro</title>
    <style>


:root {
  --ink:     #0D0D0D;
  --paper:   #F5F0E8;
  --cream:   #EDE6D3;
  --gold:    #C8962E;
  --gold2:   #E8B84B;

}

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
       .conteneur {
            width: 80%;
            margin: 0 auto;
            text-align: center;
        }
        #plateau {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
       .trou {
            width: 50px;
            height: 50px;
            border: 1px solid #ccc;

            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            background-color: #8B4513;
            color: #fff;
        }
       .trou:hover {
            background-color: #A52A2A;
        }
        #historique {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            width: 50%;
            height: 200px;
            overflow-y: auto;
            margin: 0 auto;
            background-color: #F5F5DC;
        }
     /*   button {
            margin: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }*/
        button:hover {
            background-color: #3e8e41;
        }

.logo-text {
  font-style: italic;
  font-size: 1.35rem; font-weight: 700;
  letter-spacing: -.01em;
  color: var(--blanc);
}
.logo-text span { color: var(--gold); }

button {
    margin: 10px;
    padding: 10px 20px;
    border: 1px solid #D4A843;        /*>
    border-radius: 5px;
    background-color: #D4A843;        /*>
    color: #0A0A0A;                   /*>
    cursor: pointer;
    font-weight: 600;
    transition: all 0.25s ease;
}

    </style>
</head>
<body>
    <div class="conteneur">
        <h1 class="logo-text">Des<span>Chiffres</span></h1>
        <div id="plateau"></div>
        <div id="historique"></div>
        <button id="reinitialiser">Réinitialiser</button>
        <button id="copierHistorique">Copier et poster la solution</button>
<h1 class="logo-text">Le jeu Mathematique de Math<span>Connect</span></h1>
    </div>
    <script>
        // Initialisation du plateau
        let plateau = [1, 2, 0, 3, 5, 0, 2, 4];
        let solution = [];
        let nouveauTour = true;

        // Fonction pour afficher le plateau
        function afficherPlateau() {
            let html = '';
            for (let i = 0; i < plateau.length; i++) {
                html += `<div class="trou" onclick="jouer(${i})">${plateau[i]}</div>`;
            }
            document.getElementById('plateau').innerHTML = html;
            nouveauTour = true;
        }

        // Fonction pour jouer un coup
        function jouer(index) {
            if (nouveauTour) {
                solution.push(index);
                if (solution.length > 100) {
                    solution.shift();
                }
                afficherHistorique();
                nouveauTour = false;
            }
            let graines = plateau[index];
            plateau[index] = 0;
            let i = (index + 1) % plateau.length;
            while (graines > 0) {
                plateau[i]++;
                graines--;
                i = (i + 1) % plateau.length;
            }
            // Vérifier si le dernier grain tombe dans un trou vide
            if (plateau[(i - 1 + plateau.length) % plateau.length] === 1) {
                // Fin du tour
                afficherPlateau();
            } else {
                // Continuer le tour
                jouer((i - 1 + plateau.length) % plateau.length);
            }
        }

        // Fonction pour afficher l'historique
        function afficherHistorique() {
            let html = 'Historique : ';
            for (let i = 0; i < solution.length; i++) {
                html += solution[i] + ' ';
            }
            document.getElementById('historique').innerHTML = html;
            document.getElementById('historique').scrollTop = document.getElementById('historique').scrollHeight;
        }

        // Fonction pour copier l'historique
        function copierHistorique() {
            navigator.clipboard.writeText(solution.join(', '));
            alert('Historique copié dans le presse-papiers!');
        }

        // Fonction pour réinitialiser le jeu
        function reinitialiser() {
            plateau = [1, 2, 0, 0, 5, 0, 0, 4];
            solution = [];
            nouveauTour = true;
            afficherPlateau();
            document.getElementById('historique').innerHTML = '';
        }

        // Afficher le plateau initial
        afficherPlateau();

        // Ajouter des écouteurs d'événements aux boutons
        document.getElementById('reinitialiser').addEventListener('click', reinitialiser);
        document.getElementById('copierHistorique').addEventListener('click', copierHistorique);
    </script>
</body>
</html>
