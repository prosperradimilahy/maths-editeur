<html>
<head>
    <title>MathML5 Editor</title>
</head>
<body>
    <h1>Welcome to the MathML5 Editor</h1>
    <textarea id="mathml-input" rows="10" cols="30"></textarea><br>
    <button id="convert-btn">Convert to MathML</button>
    <div id="output"></div>

    <script>
        document.getElementById('convert-btn').addEventListener('click', function() {
            const input = document.getElementById('mathml-input').value;
            const output = convertToMathML(input);
            document.getElementById('output').innerHTML = output;
        });

        function convertToMathML(input) {
            // Conversion logic here
            return '<math>' + input + '</math>'; // Placeholder
        }
    </script>
</body>
</html>
